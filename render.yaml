services:
  # Backend API
  - type: web
    name: botprocesso-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: DATAJUD_API_KEY
        sync: false
      - key: DATAJUD_BASE_URL
        sync: false

  # Frontend usando Node server
  - type: web
    name: botprocesso-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4173
      - key: VITE_API_URL
        value: https://botprocesso-backend.onrender.com
