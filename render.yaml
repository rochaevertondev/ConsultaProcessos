services:
  # Backend API
  - type: web
    name: botprocesso-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: DATAJUD_API_KEY
        sync: false
      - key: DATAJUD_BASE_URL
        sync: false

  # Frontend
  - type: static
    name: botprocesso-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDirectory: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600, must-revalidate
    envVars:
      - key: VITE_API_URL
        value: https://botprocesso-backend.onrender.com
