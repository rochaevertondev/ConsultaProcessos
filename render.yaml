services:
  # Backend API
  - type: web
    name: botprocesso-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: DATAJUD_API_KEY
        sync: false
      - key: DATAJUD_BASE_URL
        sync: false

  # Frontend (usando Nginx para servir arquivos estáticos)
  - type: web
    name: botprocesso-frontend
    runtime: docker
    region: oregon
    plan: free
    rootDir: frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://botprocesso-backend.onrender.com
